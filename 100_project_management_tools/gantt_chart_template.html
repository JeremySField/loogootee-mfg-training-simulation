<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gantt Chart Template</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#f8f8f6;color:#2C3E50;min-height:100vh;padding:2rem}

  /* ── Layout ── */
  .page{max-width:1100px;margin:0 auto}
  .page-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:8px}
  .page-title{font-size:22px;font-weight:600;color:#1A3A5C}
  .page-sub{font-size:13px;color:#5A6A7A}

  /* ── Controls ── */
  .controls{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;flex-wrap:wrap;background:#fff;border:0.5px solid #D0D8E0;border-radius:10px;padding:.75rem 1rem}
  .controls label{font-size:12px;color:#5A6A7A;display:flex;align-items:center;gap:5px}
  .controls input,.controls select{font-size:13px;padding:5px 9px;border:0.5px solid #D0D8E0;border-radius:6px;background:#fff;color:#2C3E50;height:32px;outline:none}
  .controls input:focus,.controls select:focus{border-color:#378ADD}
  .btn{font-size:12px;padding:5px 14px;border:0.5px solid #D0D8E0;border-radius:6px;background:#fff;color:#2C3E50;cursor:pointer;height:32px;white-space:nowrap;font-family:inherit}
  .btn:hover{background:#F4F6F8}
  .btn.add{border-color:#1D9E75;color:#0F6E56;background:#f0fdf8}
  .btn.add:hover{background:#e1f5ee}
  .btn.del{border-color:#E24B4A;color:#A32D2D;background:#fdf2f2}
  .btn.del:hover{background:#fde8e8}
  .btn.save{border-color:#185FA5;color:#0C447C;background:#eef5fd}
  .btn.save:hover{background:#ddeaf8}
  .sep{width:0.5px;height:20px;background:#D0D8E0;margin:0 4px}

  /* ── Edit panel ── */
  .edit-panel{background:#fff;border:0.5px solid #D0D8E0;border-radius:10px;padding:1rem 1.25rem;margin-bottom:1rem;display:none}
  .edit-panel.open{display:block}
  .edit-panel h3{font-size:13px;font-weight:600;color:#1A3A5C;margin-bottom:.75rem}
  .edit-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px}
  .edit-grid label{font-size:12px;color:#5A6A7A;display:flex;flex-direction:column;gap:3px}
  .edit-grid input,.edit-grid select,.edit-grid textarea{font-size:13px;padding:6px 8px;border:0.5px solid #D0D8E0;border-radius:6px;background:#fff;color:#2C3E50;font-family:inherit;outline:none}
  .edit-grid input:focus,.edit-grid select:focus{border-color:#378ADD}
  .edit-actions{display:flex;gap:8px;align-items:center}

  /* ── Chart container ── */
  .chart-wrap{background:#fff;border:0.5px solid #D0D8E0;border-radius:10px;padding:1.25rem;overflow-x:auto}
  .chart-inner{min-width:680px}

  /* ── Header row ── */
  .gc-header{display:grid;grid-template-columns:200px 1fr;border-bottom:1px solid #E8EDF2;padding-bottom:6px;margin-bottom:6px}
  .gc-header-col{font-size:11px;font-weight:600;color:#5A6A7A;text-transform:uppercase;letter-spacing:.05em}
  .gc-months{position:relative;height:18px}
  .gc-month-label{position:absolute;font-size:11px;color:#5A6A7A;font-weight:500;white-space:nowrap}

  /* ── Section headings ── */
  .section-row{grid-column:1/-1;padding:10px 0 3px;font-size:10px;font-weight:700;color:#5A6A7A;text-transform:uppercase;letter-spacing:.07em;border-top:0.5px solid #E8EDF2;margin-top:2px}
  .section-row:first-child{border-top:none;padding-top:4px}

  /* ── Task rows ── */
  .gc-row{display:grid;grid-template-columns:200px 1fr;align-items:center;min-height:38px;margin-bottom:3px}
  .gc-row:hover .task-label{color:#1A3A5C}
  .task-label{font-size:12.5px;color:#2C3E50;padding-right:10px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:color .12s}
  .task-label .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .task-label .name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:150px}
  .task-label .pct{font-size:10px;color:#888780;margin-left:auto;padding-right:4px}

  /* ── Bar area ── */
  .bar-area{position:relative;height:38px;display:flex;align-items:center}
  .grid-line{position:absolute;top:0;bottom:0;width:0.5px;background:#E8EDF2;pointer-events:none}
  .today-line{position:absolute;top:-2px;bottom:-2px;width:2px;background:#E24B4A;pointer-events:none;z-index:5;border-radius:1px}
  .today-label{position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:9px;color:#E24B4A;font-weight:600;white-space:nowrap;letter-spacing:.02em}

  /* ── Bars ── */
  .bar{position:absolute;height:26px;border-radius:5px;cursor:pointer;display:flex;align-items:center;padding:0 9px;font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;z-index:2;transition:filter .12s,transform .1s;text-overflow:ellipsis}
  .bar:hover{filter:brightness(1.1);transform:scaleY(1.06)}
  .bar-progress{position:absolute;top:0;left:0;height:100%;border-radius:5px;opacity:.3}
  .bar-text{position:relative;z-index:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .milestone-diamond{position:absolute;width:18px;height:18px;border-radius:3px;transform:rotate(45deg);cursor:pointer;z-index:3;transition:transform .12s}
  .milestone-diamond:hover{transform:rotate(45deg) scale(1.2)}

  /* ── Legend ── */
  .legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:1rem;padding-top:.75rem;border-top:0.5px solid #E8EDF2}
  .legend-item{display:flex;align-items:center;gap:5px;font-size:12px;color:#5A6A7A}
  .legend-swatch{width:12px;height:12px;border-radius:3px}
  .legend-swatch.ms{transform:rotate(45deg);border-radius:2px}
  .legend-prog{width:28px;height:10px;border-radius:2px;opacity:.35}

  /* ── Tooltip ── */
  .tooltip{position:fixed;background:#fff;border:0.5px solid #D0D8E0;border-radius:8px;padding:9px 13px;font-size:12px;pointer-events:none;z-index:9999;box-shadow:0 3px 12px rgba(0,0,0,.1);display:none;max-width:230px}
  .tooltip-title{font-size:13px;font-weight:600;margin-bottom:5px}
  .tooltip-row{color:#5A6A7A;line-height:1.7}

  /* ── Responsive ── */
  @media(max-width:640px){.edit-grid{grid-template-columns:1fr 1fr}.page{padding:1rem}}

  /* ── Print ── */
  @media print{.controls,.edit-panel,.btn{display:none!important}.chart-wrap{border:none;padding:0}}
</style>
</head>
<body>

<div class="page">

  <div class="page-header">
    <div>
      <div class="page-title" id="chartTitle" contenteditable="true" spellcheck="false">Project Gantt Chart</div>
      <div class="page-sub" id="chartSub" contenteditable="true" spellcheck="false">Click any task bar or label to edit &nbsp;·&nbsp; Click title to rename</div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn" onclick="window.print()">Print / Export PDF</button>
    </div>
  </div>

  <!-- Edit panel -->
  <div class="edit-panel" id="editPanel">
    <h3 id="editTitle">Edit task</h3>
    <div class="edit-grid">
      <label>Task name<input id="eLabel" placeholder="Task name"/></label>
      <label>Section / Group<input id="eSection" placeholder="e.g. Planning"/></label>
      <label>Category
        <select id="eCat">
          <option value="0">Phase (Navy)</option>
          <option value="1">Design (Teal)</option>
          <option value="2">Build (Blue)</option>
          <option value="3">Review (Amber)</option>
          <option value="4">Testing (Coral)</option>
          <option value="5">Milestone (Purple)</option>
          <option value="6">Risk (Red)</option>
          <option value="7">Support (Green)</option>
        </select>
      </label>
      <label>Start week (0 = week 1)<input id="eStart" type="number" min="0" max="99" value="0"/></label>
      <label>Duration (weeks)<input id="eDur" type="number" min="1" max="99" value="4"/></label>
      <label>Progress %<input id="eProg" type="number" min="0" max="100" value="0"/></label>
      <label>Is milestone?
        <select id="eMile"><option value="0">No — bar</option><option value="1">Yes — diamond</option></select>
      </label>
      <label>Notes<input id="eNotes" placeholder="Optional notes"/></label>
    </div>
    <div class="edit-actions">
      <button class="btn save" id="btnSave">Save</button>
      <button class="btn" onclick="closeEdit()">Cancel</button>
      <button class="btn del" id="btnDel" style="margin-left:auto">Delete task</button>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn add" onclick="addNew()">+ Add task</button>
    <div class="sep"></div>
    <label>View
      <select id="viewSel" onchange="setView(this.value)">
        <option value="8">8 weeks</option>
        <option value="12">12 weeks</option>
        <option value="26" selected>26 weeks</option>
        <option value="52">52 weeks (1 year)</option>
        <option value="104">2 years</option>
        <option value="156">3 years</option>
      </select>
    </label>
    <label>Offset (weeks)
      <input id="startOff" type="number" min="0" max="200" value="0" style="width:64px" onchange="render()"/>
    </label>
    <div class="sep"></div>
    <label>Today at week
      <input id="todayW" type="number" min="0" max="200" value="6" style="width:56px" onchange="render()"/>
    </label>
  </div>

  <!-- Chart -->
  <div class="chart-wrap">
    <div class="chart-inner" id="gcTable"></div>
    <div class="legend" id="gcLegend"></div>
  </div>

</div>

<div class="tooltip" id="tooltip"></div>

<script>
const CATS=[
  {name:'Phase',    bar:'#1A3A5C', prog:'#0C2A45', text:'#C8D8E8'},
  {name:'Design',   bar:'#1D9E75', prog:'#0F6E56', text:'#C8F0E4'},
  {name:'Build',    bar:'#378ADD', prog:'#185FA5', text:'#D4ECFC'},
  {name:'Review',   bar:'#C8A84B', prog:'#966E1A', text:'#FFF4D4'},
  {name:'Testing',  bar:'#D85A30', prog:'#993C1D', text:'#FAECE7'},
  {name:'Milestone',bar:'#534AB7', prog:'#3C3489', text:'#E8E6FC'},
  {name:'Risk',     bar:'#E24B4A', prog:'#A32D2D', text:'#FDECEA'},
  {name:'Support',  bar:'#3B6D11', prog:'#27500A', text:'#EAF3DE'},
];

let tasks=[
  {id:1, label:'Project kickoff',        cat:0, start:0,  dur:2,  prog:100, mile:false, section:'Planning', notes:''},
  {id:2, label:'Requirements & scope',   cat:1, start:1,  dur:3,  prog:90,  mile:false, section:'Planning', notes:''},
  {id:3, label:'Stakeholder alignment',  cat:3, start:2,  dur:2,  prog:75,  mile:false, section:'Planning', notes:''},
  {id:4, label:'Scope sign-off',         cat:5, start:4,  dur:1,  prog:0,   mile:true,  section:'Planning', notes:'Gate G0'},
  {id:5, label:'Architecture design',    cat:1, start:5,  dur:4,  prog:60,  mile:false, section:'Design',   notes:''},
  {id:6, label:'UI / UX wireframes',     cat:1, start:5,  dur:3,  prog:40,  mile:false, section:'Design',   notes:''},
  {id:7, label:'Design review',          cat:3, start:8,  dur:2,  prog:0,   mile:false, section:'Design',   notes:'Category A comments must close'},
  {id:8, label:'Design approved',        cat:5, start:10, dur:1,  prog:0,   mile:true,  section:'Design',   notes:'Gate G1'},
  {id:9, label:'Core module build',      cat:2, start:10, dur:6,  prog:20,  mile:false, section:'Development', notes:''},
  {id:10,label:'Integration layer',      cat:2, start:11, dur:5,  prog:10,  mile:false, section:'Development', notes:''},
  {id:11,label:'API development',        cat:2, start:13, dur:4,  prog:5,   mile:false, section:'Development', notes:''},
  {id:12,label:'Unit testing',           cat:4, start:15, dur:4,  prog:0,   mile:false, section:'Testing',  notes:''},
  {id:13,label:'Integration testing',    cat:4, start:18, dur:3,  prog:0,   mile:false, section:'Testing',  notes:''},
  {id:14,label:'UAT',                    cat:4, start:20, dur:3,  prog:0,   mile:false, section:'Testing',  notes:'Client witness required'},
  {id:15,label:'Go-live',               cat:5, start:23, dur:1,  prog:0,   mile:true,  section:'Launch',   notes:'Gate G5 — all parties sign'},
  {id:16,label:'Hypercare support',      cat:7, start:23, dur:4,  prog:0,   mile:false, section:'Launch',   notes:'30-day post-handoff window'},
];

let viewWeeks=26, editId=null, nextId=17;

function setView(v){viewWeeks=parseInt(v);render();}

function pct(w){return ((w/viewWeeks)*100).toFixed(4)+'%';}

function render(){
  const offset=parseInt(document.getElementById('startOff').value)||0;
  const todayW=parseInt(document.getElementById('todayW').value)||0;

  // Month labels
  const MN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const intervals=viewWeeks<=13?viewWeeks:viewWeeks<=26?6:viewWeeks<=52?12:viewWeeks<=104?24:36;
  const weeksPerInterval=viewWeeks/intervals;
  let mHTML='<div class="gc-months">';
  for(let i=0;i<=intervals;i++){
    const wk=i*weeksPerInterval+offset;
    const mIdx=Math.floor(wk/4.33)%12;
    const yr=Math.floor(wk/52);
    const lbl=viewWeeks>=52?(MN[mIdx]+(yr>0?` '${String(25+yr).padStart(2,'0')}`:'')):`W${Math.round(wk)+1}`;
    if(i<intervals)mHTML+=`<div class="gc-month-label" style="left:${pct(i*weeksPerInterval)}">${lbl}</div>`;
  }
  mHTML+='</div>';

  // Grid lines
  let gHTML='';
  for(let i=0;i<=intervals;i++){
    gHTML+=`<div class="grid-line" style="left:${pct(i*weeksPerInterval)}"></div>`;
  }

  // Today line
  const tRel=todayW-offset;
  if(tRel>=0&&tRel<=viewWeeks){
    gHTML+=`<div class="today-line" style="left:${pct(tRel)}"><div class="today-label">TODAY</div></div>`;
  }

  // Group by section
  const sections={};
  const sectionOrder=[];
  tasks.forEach(t=>{
    const s=t.section||'Tasks';
    if(!sections[s]){sections[s]=[];sectionOrder.push(s);}
    sections[s].push(t);
  });

  let rowsHTML='';
  sectionOrder.forEach(sec=>{
    rowsHTML+=`<div class="section-row">${sec}</div>`;
    sections[sec].forEach(t=>{
      const c=CATS[t.cat]||CATS[0];
      const relStart=t.start-offset;
      const blPct=relStart/viewWeeks*100;
      const bwPct=t.dur/viewWeeks*100;
      const clippedLeft=Math.max(0,blPct);
      const clippedRight=Math.min(blPct+bwPct,100);
      const clippedW=clippedRight-clippedLeft;

      let barHTML='';
      if(t.mile){
        const msLeft=blPct;
        if(msLeft>=0&&msLeft<=100){
          barHTML=`<div class="milestone-diamond"
            style="left:calc(${pct(relStart)} - 9px);background:${c.bar}"
            onmouseenter="showTip(event,${t.id})" onmouseleave="hideTip()" onclick="openEdit(${t.id})">
          </div>`;
        }
      } else if(clippedW>0){
        barHTML=`<div class="bar"
          style="left:${clippedLeft}%;width:${clippedW}%;background:${c.bar};color:${c.text}"
          onmouseenter="showTip(event,${t.id})" onmouseleave="hideTip()" onclick="openEdit(${t.id})">
          <div class="bar-progress" style="width:${t.prog}%;background:${c.prog}"></div>
          <span class="bar-text">${t.label}</span>
        </div>`;
      }

      rowsHTML+=`<div class="gc-row">
        <div class="task-label" onclick="openEdit(${t.id})" title="${t.label}">
          <span class="dot" style="background:${c.bar}"></span>
          <span class="name">${t.label}</span>
          ${!t.mile?`<span class="pct">${t.prog}%</span>`:''}
        </div>
        <div class="bar-area">${gHTML}${barHTML}</div>
      </div>`;
    });
  });

  document.getElementById('gcTable').innerHTML=`
    <div class="gc-header">
      <div class="gc-header-col">Task</div>
      <div>${mHTML}</div>
    </div>
    <div>${rowsHTML}</div>`;

  // Legend
  const used=new Set(tasks.map(t=>t.cat));
  document.getElementById('gcLegend').innerHTML=
    [...used].map(i=>`<div class="legend-item">
      <div class="legend-swatch" style="background:${CATS[i].bar}"></div>${CATS[i].name}
    </div>`).join('')+
    `<div class="legend-item" style="margin-left:auto">
      <div class="legend-prog" style="background:#1A3A5C"></div>Progress fill
    </div>
    <div class="legend-item">
      <div class="legend-swatch ms" style="background:#534AB7"></div>Milestone
    </div>`;
}

// Tooltip
function showTip(e,id){
  const t=tasks.find(x=>x.id===id); if(!t)return;
  const c=CATS[t.cat]||CATS[0];
  const tip=document.getElementById('tooltip');
  tip.innerHTML=`<div class="tooltip-title" style="color:${c.bar}">${t.label}</div>
    <div class="tooltip-row">Section: ${t.section||'—'}</div>
    <div class="tooltip-row">Category: ${c.name}</div>
    <div class="tooltip-row">Weeks ${t.start+1}–${t.start+t.dur} (${t.dur}w)</div>
    ${t.mile?'<div class="tooltip-row">Milestone</div>':`<div class="tooltip-row">Progress: ${t.prog}%</div>`}
    ${t.notes?`<div class="tooltip-row" style="margin-top:4px;font-style:italic">${t.notes}</div>`:''}`;
  tip.style.display='block';
  moveTip(e);
}
function moveTip(e){
  const tip=document.getElementById('tooltip');
  const x=e.clientX+16, y=e.clientY-10;
  const tw=tip.offsetWidth, th=tip.offsetHeight;
  tip.style.left=Math.min(x,window.innerWidth-tw-8)+'px';
  tip.style.top=Math.max(8,Math.min(y,window.innerHeight-th-8))+'px';
}
function hideTip(){document.getElementById('tooltip').style.display='none';}
document.addEventListener('mousemove',e=>{if(document.getElementById('tooltip').style.display==='block')moveTip(e);});

// Edit panel
function openEdit(id){
  const t=tasks.find(x=>x.id===id); if(!t)return;
  editId=id;
  document.getElementById('editTitle').textContent='Edit task: '+t.label;
  document.getElementById('eLabel').value=t.label;
  document.getElementById('eSection').value=t.section||'';
  document.getElementById('eCat').value=t.cat;
  document.getElementById('eStart').value=t.start;
  document.getElementById('eDur').value=t.dur;
  document.getElementById('eProg').value=t.prog;
  document.getElementById('eMile').value=t.mile?1:0;
  document.getElementById('eNotes').value=t.notes||'';
  document.getElementById('btnDel').style.display='inline-block';
  document.getElementById('editPanel').classList.add('open');
  document.getElementById('editPanel').scrollIntoView({behavior:'smooth',block:'nearest'});
}

function addNew(){
  editId=null;
  document.getElementById('editTitle').textContent='Add new task';
  document.getElementById('eLabel').value='New task';
  document.getElementById('eSection').value='Tasks';
  document.getElementById('eCat').value=0;
  document.getElementById('eStart').value=0;
  document.getElementById('eDur').value=4;
  document.getElementById('eProg').value=0;
  document.getElementById('eMile').value=0;
  document.getElementById('eNotes').value='';
  document.getElementById('btnDel').style.display='none';
  document.getElementById('editPanel').classList.add('open');
  document.getElementById('editPanel').scrollIntoView({behavior:'smooth',block:'nearest'});
}

function closeEdit(){
  document.getElementById('editPanel').classList.remove('open');
  editId=null;
}

document.getElementById('btnSave').onclick=function(){
  const t={
    id: editId||nextId++,
    label: document.getElementById('eLabel').value||'Task',
    section: document.getElementById('eSection').value||'Tasks',
    cat: parseInt(document.getElementById('eCat').value),
    start: parseInt(document.getElementById('eStart').value)||0,
    dur: Math.max(1,parseInt(document.getElementById('eDur').value)||1),
    prog: Math.min(100,Math.max(0,parseInt(document.getElementById('eProg').value)||0)),
    mile: document.getElementById('eMile').value==='1',
    notes: document.getElementById('eNotes').value||'',
  };
  if(editId){
    const idx=tasks.findIndex(x=>x.id===editId);
    if(idx>-1)tasks[idx]=t;
  } else {
    tasks.push(t);
  }
  closeEdit(); render();
};

document.getElementById('btnDel').onclick=function(){
  if(!editId)return;
  if(confirm('Delete this task?')){tasks=tasks.filter(x=>x.id!==editId);closeEdit();render();}
};

render();
</script>
</body>
</html>
